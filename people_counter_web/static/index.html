<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>People Counter + Polygon ROI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="video-container" id="container">
    <img id="video" src="/video" alt="Video stream" />
    <svg id="overlay">
        <!-- Линия с двумя точками -->
        <line id="line" />
        <!-- Полигон ROI -->
        <polygon id="roi" fill="rgba(0,255,255,0.3)" stroke="cyan" stroke-width="2"/>
        <!-- Хэндлы полигона -->
        <circle id="h0" class="handle" r="6"/>
        <circle id="h1" class="handle" r="6"/>
        <circle id="h2" class="handle" r="6"/>
        <circle id="h3" class="handle" r="6"/>
    </svg>

    <div class="diag">
        FPS: <span id="fps">0</span><br>
        DISP: <span id="res_disp">0×0</span><br>
        SR:   <span id="res_stream">0×0</span><br>
        BR:   <span id="br">0</span> kbps<br>
        COORD: <span id="coords">—</span>
    </div>

    <!-- Ваша проверенная логика линии -->
    <div id="point1" class="point"></div>
    <div id="point2" class="point"></div>
</div>

<script>
    const container = document.getElementById("container");
    const img       = document.getElementById("video");
    const overlay   = document.getElementById("overlay");

    // Линия
    const lineEl = document.getElementById("line");
    const pts    = [document.getElementById("point1"), document.getElementById("point2")];
    let currentLine = [[0,0],[0,0]];
    let dragLineIdx = null;

    // Полигон ROI
    const roi     = document.getElementById("roi");
    const handles = [
        document.getElementById("h0"),
        document.getElementById("h1"),
        document.getElementById("h2"),
        document.getElementById("h3")
    ];
    // стартовые вершины в системе 960×H
    let poly = [[100,100],[300,100],[300,300],[100,300]];
    let dragHandleIdx = null;

    function getScale() {
        return container.getBoundingClientRect().width / 960;
    }

    function resizeOverlay() {
        const cr = container.getBoundingClientRect();
        overlay.setAttribute("width",  cr.width);
        overlay.setAttribute("height", cr.height);
        drawLine(); positionLinePoints();
        drawPoly(); positionHandles();
    }

    // ================= ЛИНИЯ =================
    function drawLine() {
        const s = getScale();
        const [p1,p2] = currentLine;
        lineEl.setAttribute("x1", p1[0]*s);
        lineEl.setAttribute("y1", p1[1]*s);
        lineEl.setAttribute("x2", p2[0]*s);
        lineEl.setAttribute("y2", p2[1]*s);
        lineEl.setAttribute("stroke","lime");
        lineEl.setAttribute("stroke-width","2");
    }

    function positionLinePoints() {
        const s = getScale(), cr = container.getBoundingClientRect();
        currentLine.forEach((p,i)=>{
            pts[i].style.left = cr.left + p[0]*s - 8 + "px";
            pts[i].style.top  = cr.top  + p[1]*s - 8 + "px";
        });
    }

    // Drag line
    pts.forEach((el, idx) => {
        el.addEventListener("mousedown", e => {
            e.preventDefault();
            dragLineIdx = idx;
            document.body.style.cursor = "grabbing";
        });
    });
    window.addEventListener("mousemove", e => {
        if (dragLineIdx === null) return;
        const s = getScale(), cr = container.getBoundingClientRect();
        let x = (e.clientX - cr.left)/s;
        let y = (e.clientY - cr.top)/s;
        x = Math.max(0, Math.min(960, x));
        y = Math.max(0, Math.min(cr.height/s, y));
        currentLine[dragLineIdx] = [x,y];
        drawLine(); positionLinePoints();
    });
    window.addEventListener("mouseup", async () => {
        if (dragLineIdx !== null) {
            document.body.style.cursor = "";
            const [p1,p2] = currentLine;
            const f = new FormData();
            f.append("x1", p1[0]); f.append("y1", p1[1]);
            f.append("x2", p2[0]); f.append("y2", p2[1]);
            await fetch("/set_line", { method:"POST", body:f });
            dragLineIdx = null;
        }
    });

    // ================ ПОЛИГОН =================
    function drawPoly() {
        const s = getScale();
        roi.setAttribute("points", poly.map(p=>`${p[0]*s},${p[1]*s}`).join(" "));
    }
    function positionHandles() {
        const s = getScale();
        handles.forEach((h,i)=>{
            h.setAttribute("cx", poly[i][0]*s);
            h.setAttribute("cy", poly[i][1]*s);
        });
    }

    // Drag handles
    handles.forEach((h, idx) => {
        h.addEventListener("mousedown", e => {
            e.preventDefault();
            dragHandleIdx = idx;
            document.body.style.cursor = "grabbing";
        });
    });
    window.addEventListener("mousemove", e => {
        if (dragHandleIdx === null) return;
        const s = getScale(), cr = container.getBoundingClientRect();
        let x = (e.clientX - cr.left)/s;
        let y = (e.clientY - cr.top)/s;
        x = Math.max(0, Math.min(960, x));
        y = Math.max(0, Math.min(cr.height/s, y));
        poly[dragHandleIdx] = [x,y];
        drawPoly(); positionHandles();
    });
    window.addEventListener("mouseup", () => {
        if (dragHandleIdx !== null) {
            document.body.style.cursor = "";
            // здесь можно сохранять poly через /set_region
            dragHandleIdx = null;
        }
    });

    // ============== DIAGNOSTICS ==============
    const elFps = document.getElementById("fps");
    const elDisp = document.getElementById("res_disp");
    const elSR   = document.getElementById("res_stream");
    const elBr   = document.getElementById("br");
    const elCoord= document.getElementById("coords");

    async function updateStatus() {
        const s = await (await fetch("/get_status")).json();
        elFps.innerText = s.fps;
        elDisp.innerText = s.resolution_disp;
        elSR.innerText   = s.resolution_stream;
        elBr.innerText   = s.bitrate;
        elCoord.innerText= s.coords;
    }

    // ================ INIT ===================
    window.addEventListener("resize", resizeOverlay);
    img.onload = () => {
        resizeOverlay();
        updateStatus();
        setInterval(updateStatus, 1000);
    };
</script>
</body>
</html>
