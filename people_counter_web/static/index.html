<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>People Counter with Polygon ROI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="video-container" id="container">
    <img id="video" src="/video" alt="Video stream" />
    <svg id="overlay">
        <polygon id="roi-polygon" points="" />
    </svg>

    <div class="diag" id="diag">
        <div>FPS: <span id="fps">0</span></div>
        <div>DISP: <span id="res_disp">0×0</span></div>
        <div>SR: <span id="res_stream">0×0</span></div>
        <div>BR: <span id="br">0</span> kbps</div>
        <div>COORD: <span id="coords">—</span></div>
    </div>

    <!-- draggable vertices -->
    <div id="vertices"></div>
    <!-- draggable midpoints -->
    <div id="midpoints"></div>
</div>

<script>
    const container = document.getElementById("container");
    const img = document.getElementById("video");
    const overlay = document.getElementById("overlay");
    const polygon = document.getElementById("roi-polygon");
    const diag = {
        fps: document.getElementById("fps"),
        disp: document.getElementById("res_disp"),
        sr: document.getElementById("res_stream"),
        br: document.getElementById("br"),
        coords: document.getElementById("coords")
    };

    // Initial polygon (normalized coords in [0,960]x[0,frame_h])
    let poly = [[100,100],[200,100],[200,200],[100,200]];

    let vertexElems = [];
    let midElems = [];

    let dragVertexIdx = null;
    let dragMidIdx = null;

    function scaleToScreen(pt) {
        const cr = container.getBoundingClientRect();
        const scale = cr.width / 960;
        return [cr.left + pt[0]*scale, cr.top + pt[1]*scale];
    }

    function screenToScale(x, y) {
        const cr = container.getBoundingClientRect();
        const scale = cr.width / 960;
        const nx = (x - cr.left)/scale;
        const ny = (y - cr.top)/scale;
        return [Math.max(0, Math.min(960,nx)), Math.max(0,ny)];
    }

    function drawPolygon() {
        polygon.setAttribute("points", poly.map(p=>p.join(",")).join(" "));
    }

    function renderVertices() {
        const vcont = document.getElementById("vertices");
        vcont.innerHTML = "";
        vertexElems = [];
        poly.forEach((pt,i)=>{
            const el = document.createElement("div");
            el.className = "point";
            document.body.appendChild(el);
            const [sx,sy] = scaleToScreen(pt);
            el.style.left = sx - el.offsetWidth/2 + "px";
            el.style.top  = sy - el.offsetHeight/2 + "px";
            el.addEventListener("mousedown", e=>{
                e.preventDefault();
                dragVertexIdx = i;
                document.body.style.cursor = "grabbing";
            });
            vertexElems.push(el);
        });
    }

    function renderMidpoints() {
        const mcont = document.getElementById("midpoints");
        mcont.innerHTML = "";
        midElems = [];
        poly.forEach((pt,i)=>{
            const next = poly[(i+1)%poly.length];
            const mid = [(pt[0]+next[0])/2, (pt[1]+next[1])/2];
            const el = document.createElement("div");
            el.className = "midpoint";
            document.body.appendChild(el);
            const [sx,sy] = scaleToScreen(mid);
            el.style.left = sx - el.offsetWidth/2 + "px";
            el.style.top  = sy - el.offsetHeight/2 + "px";
            el.addEventListener("mousedown", e=>{
                e.preventDefault();
                dragMidIdx = i;
                document.body.style.cursor = "pointer";
            });
            midElems.push(el);
        });
    }

    window.addEventListener("mousemove", e=>{
        if (dragVertexIdx!==null) {
            const [nx,ny] = screenToScale(e.clientX, e.clientY);
            poly[dragVertexIdx] = [Math.round(nx), Math.round(ny)];
            drawPolygon();
            renderVertices();
            renderMidpoints();
        } else if (dragMidIdx!==null) {
            // insert new vertex at dragMidIdx+1
            const [nx,ny] = screenToScale(e.clientX, e.clientY);
            poly.splice(dragMidIdx+1, 0, [Math.round(nx), Math.round(ny)]);
            drawPolygon();
            renderVertices();
            renderMidpoints();
            // start dragging the new vertex
            dragVertexIdx = dragMidIdx+1;
            dragMidIdx = null;
        }
    });

    window.addEventListener("mouseup", e=>{
        if (dragVertexIdx!==null || dragMidIdx!==null) {
            document.body.style.cursor = "";
            dragVertexIdx = null;
            dragMidIdx = null;
            // here you could POST poly to /set_region
        }
    });

    function resizeOverlay() {
        const cr = container.getBoundingClientRect();
        overlay.style.width  = cr.width  + "px";
        overlay.style.height = cr.height + "px";
        drawPolygon();
        renderVertices();
        renderMidpoints();
    }

    img.onload = () => {
        resizeOverlay();
        // diagnostics loop unchanged...
        setInterval(async()=>{
            const r = await (await fetch("/get_status")).json();
            diag.fps.innerText = r.fps;
            diag.disp.innerText = r.resolution_disp;
            diag.sr.innerText   = r.resolution_stream;
            diag.br.innerText   = r.bitrate;
            diag.coords.innerText = r.coords;
        }, 1000);
    };
    window.addEventListener("resize", resizeOverlay);

</script>
</body>
</html>
