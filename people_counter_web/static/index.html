<!-- static/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>People Counter</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="video-container" id="container">
    <img id="video" src="/video" alt="Video stream" />
    <svg id="overlay"></svg>

    <div class="diag" id="diag">
        <div>FPS: <span id="fps">0</span></div>
        <div>DISP: <span id="res_disp">0×0</span></div>
        <div>SR:   <span id="res_stream">0×0</span></div>
        <div>BR:   <span id="br">0</span> kbps</div>
        <div>COORD: <span id="coords">—</span></div>
    </div>

    <div id="point1" class="point"></div>
    <div id="point2" class="point"></div>
</div>

<script>
    let currentLine = [[0,0],[0,0]];
    const container = document.getElementById("container");
    const img       = document.getElementById("video");
    const overlay   = document.getElementById("overlay");
    const lineEl    = document.createElementNS("http://www.w3.org/2000/svg", "line");
    overlay.appendChild(lineEl);

    const pt1 = document.getElementById("point1");
    const pt2 = document.getElementById("point2");
    const elFps       = document.getElementById("fps");
    const elResDisp   = document.getElementById("res_disp");
    const elResStream = document.getElementById("res_stream");
    const elBr        = document.getElementById("br");
    const elCoord     = document.getElementById("coords");

    function resizeOverlay() {
        const crect = container.getBoundingClientRect();
        overlay.setAttribute("width",  crect.width);
        overlay.setAttribute("height", crect.height);
        overlay.style.width  = crect.width  + "px";
        overlay.style.height = crect.height + "px";
        drawLine();
        positionPoints();
    }

    function drawLine() {
        const crect = container.getBoundingClientRect();
        const scale = crect.width / 960;
        const [p1, p2] = currentLine;
        lineEl.setAttribute("x1", p1[0] * scale);
        lineEl.setAttribute("y1", p1[1] * scale);
        lineEl.setAttribute("x2", p2[0] * scale);
        lineEl.setAttribute("y2", p2[1] * scale);
    }

    function positionPoints() {
        const crect = container.getBoundingClientRect();
        const scale = crect.width / 960;
        const [p1, p2] = currentLine;
        pt1.style.left = (p1[0]*scale - pt1.offsetWidth/2) + "px";
        pt1.style.top  = (p1[1]*scale - pt1.offsetHeight/2) + "px";
        pt2.style.left = (p2[0]*scale - pt2.offsetWidth/2) + "px";
        pt2.style.top  = (p2[1]*scale - pt2.offsetHeight/2) + "px";
    }

    async function updateDiagnostics() {
        const data = await (await fetch("/get_status")).json();
        elFps.innerText       = data.fps;
        elResDisp.innerText   = data.resolution_disp;
        elResStream.innerText = data.resolution_stream;
        elBr.innerText        = data.bitrate;
        elCoord.innerText     = data.coords;
        drawLine();
        positionPoints();
    }

    function makeDraggable(el, idx) {
        let dragging = false;
        el.addEventListener("mousedown", e => {
            e.preventDefault();
            dragging = true;
            document.body.style.cursor = "grabbing";
        });

        window.addEventListener("mousemove", e => {
            if (!dragging) return;
            const crect = container.getBoundingClientRect();
            const scale = crect.width / 960;
            let x = (e.clientX - crect.left) / scale;
            let y = (e.clientY - crect.top) / scale;
            x = Math.max(0, Math.min(960, x));
            y = Math.max(0, y);
            currentLine[idx] = [Math.round(x), Math.round(y)];
            drawLine();
            positionPoints();
        });

        window.addEventListener("mouseup", async () => {
            if (dragging) {
                dragging = false;
                document.body.style.cursor = "";
                const form = new FormData();
                form.append("x1", currentLine[0][0]);
                form.append("y1", currentLine[0][1]);
                form.append("x2", currentLine[1][0]);
                form.append("y2", currentLine[1][1]);
                await fetch("/set_line", { method: "POST", body: form });
                updateDiagnostics();
            }
        });
    }

    makeDraggable(pt1, 0);
    makeDraggable(pt2, 1);
    window.addEventListener("resize", resizeOverlay);

    img.onload = () => {
        resizeOverlay();
        updateDiagnostics();
        setInterval(updateDiagnostics, 1000);
    };
</script>
</body>
</html>
