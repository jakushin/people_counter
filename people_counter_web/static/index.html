<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>People Counter</title>
    <link rel="stylesheet" href="/static/style.css">
</head><body>
<div class="video-container" id="container">
    <img id="video" src="/video" alt="">
    <svg id="overlay"></svg>
    <div class="diag">
        <div>FPS: <span id="fps">0</span></div>
        <div>DISP: <span id="res_disp">0×0</span></div>
        <div>SR: <span id="res_stream">0×0</span></div>
        <div>BR: <span id="br">0</span> kbps</div>
        <div>COORD: <span id="coords">—</span></div>
    </div>
    <div id="point1" class="point"></div>
    <div id="point2" class="point"></div>
</div>
<script>
    const container = document.getElementById("container");
    const img = document.getElementById("video");
    const overlay = document.getElementById("overlay");
    const lineEl = document.createElementNS("http://www.w3.org/2000/svg","line");
    overlay.appendChild(lineEl);

    const pt1 = document.getElementById("point1");
    const pt2 = document.getElementById("point2");
    const elFps = document.getElementById("fps");
    const elDisp = document.getElementById("res_disp");
    const elSR = document.getElementById("res_stream");
    const elBr = document.getElementById("br");
    const elCoord = document.getElementById("coords");

    let currentLine = [[0,0],[0,0]];

    function resize() {
        const cr = container.getBoundingClientRect(), scale=cr.width/960;
        overlay.setAttribute("width",cr.width);
        overlay.setAttribute("height",cr.height);
        overlay.style.width=cr.width+"px"; overlay.style.height=cr.height+"px";
        draw(); position();
    }

    function draw(){
        const cr = container.getBoundingClientRect(), scale=cr.width/960;
        const [p1,p2]=currentLine;
        lineEl.setAttribute("x1",p1[0]*scale);
        lineEl.setAttribute("y1",p1[1]*scale);
        lineEl.setAttribute("x2",p2[0]*scale);
        lineEl.setAttribute("y2",p2[1]*scale);
    }
    function position(){
        const cr=container.getBoundingClientRect(),scale=cr.width/960;
        const [p1,p2]=currentLine;
        pt1.style.left=(p1[0]*scale-8)+"px"; pt1.style.top=(p1[1]*scale-8)+"px";
        pt2.style.left=(p2[0]*scale-8)+"px"; pt2.style.top=(p2[1]*scale-8)+"px";
    }

    async function update(){
        const line = await (await fetch("/get_line")).json();
        currentLine=[line.line_start,line.line_end];
        elCoord.innerText=`${line.line_start} → ${line.line_end}`;
        const stat=await (await fetch("/get_status")).json();
        elFps.innerText=stat.fps; elDisp.innerText=stat.resolution_disp;
        elSR.innerText=stat.resolution_stream; elBr.innerText=stat.bitrate;
        draw(); position();
    }

    function makeDraggable(el,idx){
        let drag=false;
        el.onmousedown=e=>{e.preventDefault();drag=true;document.body.style.cursor="grabbing";};
        window.onmousemove=e=>{
            if(!drag)return;
            const cr=container.getBoundingClientRect(),scale=cr.width/960;
            let x=(e.clientX-cr.left)/scale, y=(e.clientY-cr.top)/scale;
            x=Math.max(0,Math.min(960,x)); y=Math.max(0,Math.min(cr.height/scale,y));
            currentLine[idx]=[Math.round(x),Math.round(y)];
            draw(); position();
        };
        window.onmouseup=async()=>{
            if(drag){drag=false;document.body.style.cursor="";
                const form=new FormData();
                form.append("x1",currentLine[0][0]);form.append("y1",currentLine[0][1]);
                form.append("x2",currentLine[1][0]);form.append("y2",currentLine[1][1]);
                await fetch("/set_line",{method:"POST",body:form});
                update();
            }
        };
    }

    makeDraggable(pt1,0);
    makeDraggable(pt2,1);
    window.onresize=resize;
    img.onload=()=>{
        resize();
        update();
        setInterval(update,1000);
    };
</script>
</body></html>
