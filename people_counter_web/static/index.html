<!-- static/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>People Counter</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="video-container" id="container">
    <img id="video" src="/video" alt="Video stream" />
    <svg id="overlay"></svg>

    <div class="diag" id="diag">
        <div>FPS: <span id="fps">0</span></div>
        <div>DISP: <span id="res_disp">0×0</span></div>
        <div>SR: <span id="res_stream">0×0</span></div>
        <div>BR: <span id="br">0</span> kbps</div>
        <div>COORD: <span id="coords">—</span></div>
    </div>

    <div id="point1" class="point line-point"></div>
    <div id="point2" class="point line-point"></div>

    <!-- Control buttons -->
    <div class="controls">
        <button id="btn-new-poly">New Polygon</button>
        <button id="btn-reset-poly">Reset Polygon</button>
    </div>
</div>

<script>
    const container = document.getElementById("container");
    const img = document.getElementById("video");
    const overlay = document.getElementById("overlay");
    const lineEl = document.createElementNS("http://www.w3.org/2000/svg","line");
    overlay.appendChild(lineEl);

    const pts = [document.getElementById("point1"), document.getElementById("point2")];
    const elFps = document.getElementById("fps");
    const elDisp = document.getElementById("res_disp");
    const elSR   = document.getElementById("res_stream");
    const elBr   = document.getElementById("br");
    const elCoord= document.getElementById("coords");

    // Polygon elements
    const polyGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
    overlay.appendChild(polyGroup);
    const polyShape = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
    polyShape.setAttribute("fill", "rgba(0,255,0,0.3)");
    polyShape.setAttribute("stroke", "green");
    polyShape.setAttribute("stroke-width", "2");
    polyGroup.appendChild(polyShape);

    let currentLine = [[0,0],[0,0]];
    let polygonPoints = [];
    let draggingIdx = null;
    let draggingPolyPoint = null;
    let polygonMode = false;
    let currentScale = 1;

    // Control buttons
    document.getElementById("btn-new-poly").addEventListener("click", () => {
        polygonMode = true;
        polygonPoints = [];
        updatePolygon();
        alert("Polygon mode: ON. Click on image to add points");
    });

    document.getElementById("btn-reset-poly").addEventListener("click", async () => {
        polygonPoints = [];
        polygonMode = false;
        updatePolygon();
        await savePolygon();
        alert("Polygon reset");
    });

    function resizeOverlay(){
        const cr = container.getBoundingClientRect();
        currentScale = cr.width / 960;

        overlay.setAttribute("width", cr.width);
        overlay.setAttribute("height", cr.height);
        overlay.style.width = cr.width + "px";
        overlay.style.height = cr.height + "px";

        drawLine();
        positionPoints();
        updatePolygon();
    }

    function drawLine(){
        const [p1,p2] = currentLine;
        lineEl.setAttribute("x1", p1[0] * currentScale);
        lineEl.setAttribute("y1", p1[1] * currentScale);
        lineEl.setAttribute("x2", p2[0] * currentScale);
        lineEl.setAttribute("y2", p2[1] * currentScale);
    }

    function positionPoints(){
        currentLine.forEach((p, i) => {
            pts[i].style.left = (p[0] * currentScale - 8) + "px";
            pts[i].style.top  = (p[1] * currentScale - 8) + "px";
        });
    }

    function updatePolygon() {
        // Clear existing points
        while (polyGroup.children.length > 1) {
            polyGroup.removeChild(polyGroup.lastChild);
        }

        // Update polygon shape if we have points
        if (polygonPoints.length > 0) {
            const pointsStr = polygonPoints.map(p =>
                `${p[0] * currentScale},${p[1] * currentScale}`
            ).join(" ");
            polyShape.setAttribute("points", pointsStr);
            polyShape.style.display = "block";
        } else {
            polyShape.style.display = "none";
        }

        // Add points
        polygonPoints.forEach((point, idx) => {
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", point[0] * currentScale);
            circle.setAttribute("cy", point[1] * currentScale);
            circle.setAttribute("r", "8");
            circle.setAttribute("fill", "blue");
            circle.setAttribute("stroke", "white");
            circle.setAttribute("stroke-width", "2");
            circle.setAttribute("class", "poly-point");
            circle.setAttribute("data-index", idx);
            circle.style.cursor = "pointer";
            circle.style.pointerEvents = "all";
            polyGroup.appendChild(circle);
        });
    }

    async function updateDiagnostics(){
        try {
            const {line_start, line_end} = await (await fetch("/get_line")).json();
            currentLine = [line_start, line_end];
            elCoord.innerText = `${line_start} → ${line_end}`;

            const stat = await (await fetch("/get_status")).json();
            elFps.innerText = stat.fps;
            elDisp.innerText = stat.resolution_disp;
            elSR.innerText  = stat.resolution_stream;
            elBr.innerText  = stat.bitrate;

            drawLine();
            positionPoints();
        } catch (e) {
            console.error("Diagnostics update failed:", e);
        }
    }

    async function loadPolygon() {
        try {
            const response = await fetch("/get_region");
            const data = await response.json();
            if (data.region && data.region.length > 0) {
                polygonPoints = data.region;
                updatePolygon();
            }
        } catch (e) {
            console.error("Polygon load failed:", e);
        }
    }

    async function savePolygon() {
        try {
            await fetch("/set_region", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ region: polygonPoints })
            });
            console.log("Polygon saved:", polygonPoints);
        } catch (e) {
            console.error("Polygon save failed:", e);
        }
    }

    // Line points dragging
    pts.forEach((el, idx) => {
        el.addEventListener("mousedown", e => {
            e.preventDefault();
            draggingIdx = idx;
            document.body.style.cursor = "grabbing";
        });
    });

    // Polygon points dragging
    overlay.addEventListener("mousedown", e => {
        if (e.target.classList.contains("poly-point")) {
            draggingPolyPoint = parseInt(e.target.getAttribute("data-index"));
            document.body.style.cursor = "grabbing";
        } else if (polygonMode && e.target === overlay) {
            // Add new point - only in polygon mode
            const rect = overlay.getBoundingClientRect();
            const x = (e.clientX - rect.left) / currentScale;
            const y = (e.clientY - rect.top) / currentScale;

            polygonPoints.push([Math.round(x), Math.round(y)]);
            updatePolygon();
        }
    });

    window.addEventListener("mousemove", e => {
        if (draggingIdx !== null) {
            const rect = container.getBoundingClientRect();
            const x = (e.clientX - rect.left) / currentScale;
            const y = (e.clientY - rect.top) / currentScale;

            currentLine[draggingIdx] = [
                Math.max(0, Math.min(960, Math.round(x))),
                Math.max(0, Math.min(rect.height / currentScale, Math.round(y)))
            ];

            drawLine();
            positionPoints();
        }

        if (draggingPolyPoint !== null) {
            const rect = overlay.getBoundingClientRect();
            const x = (e.clientX - rect.left) / currentScale;
            const y = (e.clientY - rect.top) / currentScale;

            polygonPoints[draggingPolyPoint] = [Math.round(x), Math.round(y)];
            updatePolygon();
        }
    });

    window.addEventListener("mouseup", async () => {
        if (draggingIdx !== null) {
            document.body.style.cursor = "";
            const [p1, p2] = currentLine;

            const formData = new FormData();
            formData.append("x1", p1[0]);
            formData.append("y1", p1[1]);
            formData.append("x2", p2[0]);
            formData.append("y2", p2[1]);

            try {
                await fetch("/set_line", { method: "POST", body: formData });
                await updateDiagnostics();
            } catch (e) {
                console.error("Line save failed:", e);
            }

            draggingIdx = null;
        }

        if (draggingPolyPoint !== null) {
            document.body.style.cursor = "";
            await savePolygon();
            draggingPolyPoint = null;
        }
    });

    window.addEventListener("resize", resizeOverlay);

    img.onload = () => {
        resizeOverlay();
        updateDiagnostics();
        loadPolygon();
        setInterval(updateDiagnostics, 1000);
    };
</script>
</body>
</html>
