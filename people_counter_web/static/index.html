<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>People Counter with Polygon ROI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="video-container" id="container">
    <img id="video" src="/video" alt="Video stream" />
    <svg id="overlay">
        <!-- ваша линия -->
        <line id="line" />
        <!-- полигон ROI -->
        <polygon id="roi" fill="rgba(0,255,255,0.3)" stroke="cyan" stroke-width="2" />
        <!-- хендлы полигона -->
        <circle class="roi-handle" r="6" fill="lime" stroke="#fff" stroke-width="2" />
        <circle class="roi-handle" r="6" fill="lime" stroke="#fff" stroke-width="2" />
        <circle class="roi-handle" r="6" fill="lime" stroke="#fff" stroke-width="2" />
        <circle class="roi-handle" r="6" fill="lime" stroke="#fff" stroke-width="2" />
    </svg>

    <div class="diag">
        FPS: <span id="fps">0</span><br>
        DISP: <span id="res_disp">0×0</span><br>
        SR:   <span id="res_stream">0×0</span><br>
        BR:   <span id="br">0</span> kbps<br>
        COORD: <span id="coords">—</span>
    </div>

    <!-- ваша линия точки -->
    <div id="point1" class="point"></div>
    <div id="point2" class="point"></div>
</div>

<script>
    const container = document.getElementById("container");
    const img = document.getElementById("video");
    const overlay = document.getElementById("overlay");
    const lineEl = document.getElementById("line");
    const pts = [document.getElementById("point1"), document.getElementById("point2")];
    const handles = Array.from(overlay.querySelectorAll(".roi-handle"));
    const roi = document.getElementById("roi");

    let currentLine = [[0,0],[0,0]];
    let dragLineIdx = null;

    // стартовый полигон (можете заменить на загрузку из /get_region)
    let poly = [[100,100],[200,100],[200,200],[100,200]];
    let dragHandleIdx = null;

    function getScale() {
        return container.getBoundingClientRect().width / 960;
    }

    function resizeOverlay() {
        const cr = container.getBoundingClientRect();
        overlay.setAttribute("width",  cr.width);
        overlay.setAttribute("height", cr.height);
        drawLine();
        positionLinePoints();
        drawPoly();
        positionHandles();
    }

    function drawLine() {
        const s = getScale();
        const [p1,p2] = currentLine;
        lineEl.setAttribute("x1", p1[0]*s);
        lineEl.setAttribute("y1", p1[1]*s);
        lineEl.setAttribute("x2", p2[0]*s);
        lineEl.setAttribute("y2", p2[1]*s);
        lineEl.setAttribute("stroke", "lime");
        lineEl.setAttribute("stroke-width", "2");
    }

    function positionLinePoints() {
        const s = getScale(), cr = container.getBoundingClientRect();
        currentLine.forEach((p,i) => {
            pts[i].style.left = cr.left + p[0]*s - pts[i].offsetWidth/2 + "px";
            pts[i].style.top  = cr.top  + p[1]*s - pts[i].offsetHeight/2 + "px";
        });
    }

    function drawPoly() {
        const s = getScale();
        roi.setAttribute("points", poly.map(p=>`${p[0]*s},${p[1]*s}`).join(" "));
    }

    function positionHandles() {
        const s = getScale(), cr = container.getBoundingClientRect();
        handles.forEach((h,i) => {
            const [x,y] = poly[i];
            h.setAttribute("cx", x*s);
            h.setAttribute("cy", y*s);
        });
    }

    // Drag line points
    pts.forEach((el, idx) => {
        el.addEventListener("mousedown", e => {
            e.preventDefault();
            dragLineIdx = idx;
            document.body.style.cursor = "grabbing";
        });
    });
    window.addEventListener("mousemove", e => {
        if (dragLineIdx === null) return;
        const cr = container.getBoundingClientRect(), s = getScale();
        let x = (e.clientX - cr.left)/s, y = (e.clientY - cr.top)/s;
        x = Math.max(0, Math.min(960, x));
        y = Math.max(0, Math.min(cr.height/s, y));
        currentLine[dragLineIdx] = [x,y];
        drawLine();
        positionLinePoints();
    });
    window.addEventListener("mouseup", async () => {
        if (dragLineIdx !== null) {
            document.body.style.cursor = "";
            const [p1,p2] = currentLine;
            const f = new FormData();
            f.append("x1", p1[0]);
            f.append("y1", p1[1]);
            f.append("x2", p2[0]);
            f.append("y2", p2[1]);
            await fetch("/set_line", { method:"POST", body:f });
            dragLineIdx = null;
        }
    });

    // Drag polygon handles
    handles.forEach((h, idx) => {
        h.addEventListener("mousedown", e => {
            e.preventDefault();
            dragHandleIdx = idx;
            document.body.style.cursor = "grabbing";
        });
    });
    window.addEventListener("mousemove", e => {
        if (dragHandleIdx === null) return;
        const cr = container.getBoundingClientRect(), s = getScale();
        let x = (e.clientX - cr.left)/s, y = (e.clientY - cr.top)/s;
        x = Math.max(0, Math.min(960, x));
        y = Math.max(0, Math.min(cr.height/s, y));
        poly[dragHandleIdx] = [x,y];
        drawPoly();
        positionHandles();
    });
    window.addEventListener("mouseup", async () => {
        if (dragHandleIdx !== null) {
            document.body.style.cursor = "";
            // при желании: POST сохранение полигона
            dragHandleIdx = null;
        }
    });

    window.addEventListener("resize", resizeOverlay);
    img.onload = () => {
        resizeOverlay();
        setInterval(async () => {
            const s = await fetch("/get_status").then(r=>r.json());
            document.getElementById("fps").innerText = s.fps;
            document.getElementById("res_disp").innerText = s.resolution_disp;
            document.getElementById("res_stream").innerText= s.resolution_stream;
            document.getElementById("br").innerText = s.bitrate;
            document.getElementById("coords").innerText = s.coords;
        }, 1000);
    };
</script>
</body>
</html>
