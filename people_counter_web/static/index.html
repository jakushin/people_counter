<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>People Counter</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="video-container" id="container">
    <img id="video" src="/video" alt="Видео" />
    <svg id="overlay"></svg>

    <div class="diag" id="diag">
        <div>FPS: <span id="fps">0</span></div>
        <div>DISP: <span id="res_disp">0×0</span></div>
        <div>SR: <span id="res_stream">0×0</span></div>
        <div>BR: <span id="br">0</span> kbps</div>
        <div>COORD: <span id="coords">—</span></div>
    </div>

    <div id="point1" class="point"></div>
    <div id="point2" class="point"></div>
</div>

<script>
    // --- ==== Общие переменные ==== ---
    const container = document.getElementById("container");
    const img       = document.getElementById("video");
    const overlay   = document.getElementById("overlay");
    const lineEl    = document.createElementNS("http://www.w3.org/2000/svg", "line");
    overlay.appendChild(lineEl);

    const ptElems = [
        document.getElementById("point1"),
        document.getElementById("point2"),
    ];

    const elFps       = document.getElementById("fps");
    const elResDisp   = document.getElementById("res_disp");
    const elResStream = document.getElementById("res_stream");
    const elBr        = document.getElementById("br");
    const elCoord     = document.getElementById("coords");

    let currentLine = [[0,0],[0,0]];
    let draggingIdx = null;  // индекс точки, которую тащим

    // --- ==== Вспомогательные функции ==== ---

    function resizeOverlay() {
        const cr = container.getBoundingClientRect();
        overlay.setAttribute("width",  cr.width);
        overlay.setAttribute("height", cr.height);
        overlay.style.width  = cr.width  + "px";
        overlay.style.height = cr.height + "px";
        drawLine();
        positionPoints();
    }

    function drawLine() {
        const cr = container.getBoundingClientRect();
        const scale = cr.width / 960;
        const [p1, p2] = currentLine;
        lineEl.setAttribute("x1", p1[0] * scale);
        lineEl.setAttribute("y1", p1[1] * scale);
        lineEl.setAttribute("x2", p2[0] * scale);
        lineEl.setAttribute("y2", p2[1] * scale);
        lineEl.setAttribute("stroke", "lime");
        lineEl.setAttribute("stroke-width", 2);
    }

    function positionPoints() {
        const cr = container.getBoundingClientRect();
        const scale = cr.width / 960;
        currentLine.forEach((pt, idx) => {
            const elem = ptElems[idx];
            const x = pt[0] * scale - elem.offsetWidth / 2;
            const y = pt[1] * scale - elem.offsetHeight / 2;
            elem.style.left = x + "px";
            elem.style.top  = y + "px";
        });
    }

    async function updateDiagnostics() {
        // Сначала линия
        const lineRes = await fetch("/get_line");
        const { line_start, line_end } = await lineRes.json();
        currentLine = [line_start, line_end];
        elCoord.innerText = `${line_start} → ${line_end}`;

        // Затем остальные данные
        const statRes = await fetch("/get_status");
        const data = await statRes.json();
        elFps.innerText       = data.fps;
        elResDisp.innerText   = data.resolution_disp;
        elResStream.innerText = data.resolution_stream;
        elBr.innerText        = data.bitrate;

        // Рисуем сразу
        drawLine();
        positionPoints();
    }

    // --- ==== Drag'n'Drop ==== ---

    // При нажатии на точку
    ptElems.forEach((el, idx) => {
        el.addEventListener("mousedown", e => {
            e.preventDefault();
            draggingIdx = idx;
            document.body.style.cursor = "grabbing";
        });
    });

    // При движении мыши
    window.addEventListener("mousemove", e => {
        if (draggingIdx === null) return;
        const cr = container.getBoundingClientRect();
        const scale = cr.width / 960;
        let x = (e.clientX - cr.left) / scale;
        let y = (e.clientY - cr.top) / scale;
        // ограничиваем по области
        x = Math.max(0, Math.min(960, x));
        y = Math.max(0, Math.min(cr.height / scale, y));
        currentLine[draggingIdx] = [Math.round(x), Math.round(y)];
        drawLine();
        positionPoints();
    });

    // При отпускании кнопки
    window.addEventListener("mouseup", async () => {
        if (draggingIdx !== null) {
            document.body.style.cursor = "";
            // сразу сохраняем
            const [p1, p2] = currentLine;
            const form = new FormData();
            form.append("x1", p1[0]);
            form.append("y1", p1[1]);
            form.append("x2", p2[0]);
            form.append("y2", p2[1]);
            await fetch("/set_line", { method: "POST", body: form });
            // и обновляем всё
            await updateDiagnostics();
            draggingIdx = null;
        }
    });

    // --- ==== Инициализация ==== ---

    window.addEventListener("resize", resizeOverlay);

    img.onload = () => {
        resizeOverlay();
        updateDiagnostics();
        // Обновляем диагностику каждую секунду
        setInterval(updateDiagnostics, 1000);
    };
</script>
</body>
</html>
