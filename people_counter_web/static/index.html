<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>People Counter</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="video-container" id="container">
    <img id="video" src="/video" alt="Video stream" />
    <svg id="overlay">
        <!-- линия -->
        <line id="line" />
        <!-- полигон ROI -->
        <polygon id="roi-polygon" />
    </svg>

    <div class="diag">
        FPS: <span id="fps">0</span><br>
        DISP: <span id="res_disp">0×0</span><br>
        SR:   <span id="res_stream">0×0</span><br>
        BR:   <span id="br">0</span> kbps<br>
        COORD: <span id="coords">—</span>
    </div>

    <!-- точки линии -->
    <div id="point1" class="point"></div>
    <div id="point2" class="point"></div>
    <!-- ручки полигона -->
    <div id="handles"></div>
</div>

<script>
    const container = document.getElementById("container");
    const img = document.getElementById("video");
    const overlay = document.getElementById("overlay");
    const lineEl = document.getElementById("line");
    const polyEl = document.getElementById("roi-polygon");

    // Линия
    const pts = [
        document.getElementById("point1"),
        document.getElementById("point2")
    ];
    let currentLine = [[0,0],[0,0]];
    let dragLineIdx = null;

    // ROI-полигон
    let poly = [[100,100],[200,100],[200,200],[100,200]];
    const handleContainer = document.getElementById("handles");
    let handleElems = [];
    let dragHandleIdx = null;

    // Диагностика
    const elFps = document.getElementById("fps");
    const elDisp = document.getElementById("res_disp");
    const elSR   = document.getElementById("res_stream");
    const elBr   = document.getElementById("br");
    const elCoord= document.getElementById("coords");

    function scale() {
        const cr = container.getBoundingClientRect();
        return cr.width / 960;
    }
    function resizeOverlay() {
        const cr = container.getBoundingClientRect();
        overlay.style.width  = cr.width + "px";
        overlay.style.height = cr.height + "px";
        drawLine(); positionPts();
        drawPoly(); positionHandles();
    }

    // Линия
    function drawLine() {
        const s = scale();
        const [p1,p2] = currentLine;
        lineEl.setAttribute("x1", p1[0]*s);
        lineEl.setAttribute("y1", p1[1]*s);
        lineEl.setAttribute("x2", p2[0]*s);
        lineEl.setAttribute("y2", p2[1]*s);
    }
    function positionPts() {
        const s = scale();
        currentLine.forEach((p,i)=>{
            pts[i].style.left = p[0]*s - 8 + "px";
            pts[i].style.top  = p[1]*s - 8 + "px";
        });
    }

    // Полигоны
    function drawPoly() {
        const s = scale();
        polyEl.setAttribute("points",
            poly.map(p => `${p[0]*s},${p[1]*s}`).join(" ")
        );
    }
    function positionHandles() {
        // удаляем старые
        handleContainer.innerHTML = "";
        handleElems = [];
        // создаём новые
        const s = scale();
        poly.forEach((p,i)=>{
            const el = document.createElement("div");
            el.className = "handle";
            document.body.appendChild(el);
            el.style.left = p[0]*s - 6 + "px";
            el.style.top  = p[1]*s - 6 + "px";
            el.addEventListener("mousedown", e=>{
                e.preventDefault();
                dragHandleIdx = i;
                document.body.style.cursor = "grabbing";
            });
            handleElems.push(el);
        });
    }

    // Обновление данных с сервера (линия + статус)
    async function updateAll() {
        // линия
        let res = await fetch("/get_line");
        let j = await res.json();
        currentLine = [j.line_start, j.line_end];
        elCoord.innerText = `${j.line_start} → ${j.line_end}`;
        // статус
        res = await fetch("/get_status");
        j = await res.json();
        elFps.innerText = j.fps;
        elDisp.innerText = j.resolution_disp;
        elSR.innerText  = j.resolution_stream;
        elBr.innerText  = j.bitrate;
        drawLine(); positionPts();
    }

    // Drag линия
    pts.forEach((el, idx)=>{
        el.addEventListener("mousedown", e=>{
            e.preventDefault();
            dragLineIdx = idx;
            document.body.style.cursor = "grabbing";
        });
    });
    window.addEventListener("mousemove", e=>{
        if (dragLineIdx===null) return;
        const s = scale();
        const cr = container.getBoundingClientRect();
        let x = (e.clientX - cr.left)/s;
        let y = (e.clientY - cr.top)/s;
        x = Math.max(0, Math.min(960, x));
        y = Math.max(0, Math.min(cr.height/s, y));
        currentLine[dragLineIdx] = [Math.round(x), Math.round(y)];
        drawLine(); positionPts();
    });
    window.addEventListener("mouseup", async ()=>{
        if (dragLineIdx!==null) {
            document.body.style.cursor="";
            const f = new FormData();
            f.append("x1", currentLine[0][0]);
            f.append("y1", currentLine[0][1]);
            f.append("x2", currentLine[1][0]);
            f.append("y2", currentLine[1][1]);
            await fetch("/set_line", { method:"POST", body:f });
            dragLineIdx = null;
            updateAll();
        }
    });

    // Drag полигон
    window.addEventListener("mousemove", e=>{
        if (dragHandleIdx===null) return;
        const s = scale();
        const cr = container.getBoundingClientRect();
        let x = (e.clientX - cr.left)/s;
        let y = (e.clientY - cr.top)/s;
        x = Math.max(0, Math.min(960, x));
        y = Math.max(0, Math.min(cr.height/s, y));
        poly[dragHandleIdx] = [Math.round(x), Math.round(y)];
        drawPoly(); positionHandles();
    });
    window.addEventListener("mouseup", async ()=>{
        if (dragHandleIdx!==null) {
            document.body.style.cursor="";
            // можно тут save_region
            dragHandleIdx = null;
        }
    });

    window.addEventListener("resize", resizeOverlay);
    img.onload = ()=>{
        resizeOverlay();
        updateAll();
        setInterval(updateAll, 1000);
    };
</script>
</body>
</html>
