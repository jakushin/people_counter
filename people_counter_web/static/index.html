<!-- static/index.html (добавлено SVG-rect и 4 «ручки») -->
<!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <title>People Counter</title>
    <link rel="stylesheet" href="/static/style.css">
</head><body>
<div class="video-container" id="container">
    <img id="video" src="/video">
    <svg id="overlay"></svg>
    <!-- handles for ROI corners -->
    <div id="h1" class="handle"></div>
    <div id="h2" class="handle"></div>
    <div id="h3" class="handle"></div>
    <div id="h4" class="handle"></div>
    <div class="diag" id="diag">…</div>
    <div id="point1" class="point"></div>
    <div id="point2" class="point"></div>
</div>
<script>
    const container = document.getElementById("container");
    const img       = document.getElementById("video");
    const overlay   = document.getElementById("overlay");
    const rectEl    = document.createElementNS("http://www.w3.org/2000/svg","rect");
    overlay.appendChild(rectEl);

    const handles = ["h1","h2","h3","h4"].map(id=>document.getElementById(id));
    let region = [50,50,300,300]; // [x1,y1,x2,y2]
    // load saved region
    async function loadRegion(){
        const {region: r} = await (await fetch("/get_region")).json();
        if(r) region = r;
    }

    function resizeAll(){
        const cr = container.getBoundingClientRect(), scale=cr.width/960;
        overlay.setAttribute("width",cr.width); overlay.setAttribute("height",cr.height);
        overlay.style.width=cr.width+"px"; overlay.style.height=cr.height+"px";
        // rect
        rectEl.setAttribute("x",region[0]*scale);
        rectEl.setAttribute("y",region[1]*scale);
        rectEl.setAttribute("width",(region[2]-region[0])*scale);
        rectEl.setAttribute("height",(region[3]-region[1])*scale);
        rectEl.setAttribute("stroke","lime"); rectEl.setAttribute("fill","none"); rectEl.setAttribute("stroke-width",2);
        // handles
        handles.forEach((h,i)=>{
            const [x,y] = [
                i%2? region[2] : region[0],
                i>1? region[3] : region[1]
            ];
            h.style.left = cr.left + x*scale - h.offsetWidth/2 + "px";
            h.style.top  = cr.top  + y*scale - h.offsetHeight/2 + "px";
        });
    }

    // drag handles
    handles.forEach((h,idx)=>{
        let drag=false;
        h.onmousedown = e=>{e.preventDefault(); drag=true;document.body.style.cursor="grabbing";}
        window.onmousemove = e=>{
            if(!drag) return;
            const cr=container.getBoundingClientRect(), scale=cr.width/960;
            let x=(e.clientX-cr.left)/scale, y=(e.clientY-cr.top)/scale;
            x=Math.max(0,Math.min(960,x)); y=Math.max(0,Math.min(540,y));
            // update region corner
            if(idx%2) region[2]=Math.round(x); else region[0]=Math.round(x);
            if(idx>1) region[3]=Math.round(y); else region[1]=Math.round(y);
            resizeAll();
        };
        window.onmouseup = async ()=>{
            if(drag){ drag=false; document.body.style.cursor="";
                // save
                const form=new FormData();
                form.append("x1",region[0]);form.append("y1",region[1]);
                form.append("x2",region[2]);form.append("y2",region[3]);
                await fetch("/set_region",{method:"POST",body:form});
            }
        };
    });

    // init
    img.onload = async ()=>{
        await loadRegion();
        resizeAll();
        // existing init for line & diag...
    };
    window.onresize = resizeAll;
</script>
</body></html>
