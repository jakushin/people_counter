<!-- static/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>People Counter</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="video-container">
    <img id="video" src="/video" alt="Видео" />
    <div class="diag" id="diag">
        FPS: <span id="fps">0</span><br>
        RES: <span id="res">0x0</span><br>
        Line: <span id="line">—</span>
    </div>
    <div id="point1" class="point"></div>
    <div id="point2" class="point"></div>
</div>

<script>
    let currentLine = [[0,0],[0,0]];
    const pt1 = document.getElementById("point1");
    const pt2 = document.getElementById("point2");

    // Обновление позиции точек и текста линии
    async function updateLine() {
        const res = await fetch("/get_line");
        const { line_start, line_end } = await res.json();
        currentLine = [line_start, line_end];

        const img = document.getElementById("video");
        const scale = img.clientWidth / 960;
        pt1.style.left = (line_start[0]*scale - 8) + "px";
        pt1.style.top  = (line_start[1]*scale - 8) + "px";
        pt2.style.left = (line_end[0]*scale - 8) + "px";
        pt2.style.top  = (line_end[1]*scale - 8) + "px";
        document.getElementById("line").innerText = `${line_start} → ${line_end}`;
    }

    // Обновление FPS и разрешения
    async function updateStatus() {
        const res = await fetch("/get_status");
        const data = await res.json();
        document.getElementById("fps").innerText = data.fps;
        document.getElementById("res").innerText = data.frame_size;
    }

    // Drag'n'drop точек
    function makeDraggable(el, idx) {
        el.onmousedown = e => {
            e.preventDefault();
            document.onmousemove = ev => {
                const img = document.getElementById("video");
                const scale = img.clientWidth / 960;
                let x = (ev.pageX - img.offsetLeft) / scale;
                let y = (ev.pageY - img.offsetTop) / scale;
                x = Math.max(0, Math.min(960, x));
                y = Math.max(0, y);
                currentLine[idx] = [Math.round(x), Math.round(y)];
                postLine();
            };
            document.onmouseup = () => {
                document.onmousemove = null;
                document.onmouseup = null;
            };
        };
    }

    async function postLine() {
        const form = new FormData();
        form.append("x1", currentLine[0][0]);
        form.append("y1", currentLine[0][1]);
        form.append("x2", currentLine[1][0]);
        form.append("y2", currentLine[1][1]);
        await fetch("/set_line", { method: "POST", body: form });
        updateLine();
    }

    makeDraggable(pt1, 0);
    makeDraggable(pt2, 1);

    setInterval(updateLine, 1000);
    setInterval(updateStatus, 1000);
</script>
</body>
</html>
